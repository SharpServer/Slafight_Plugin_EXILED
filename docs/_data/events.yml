- id: facility-termination
  name: FACILITY TERMINATION
  status: 実装中
  requirement: 無し
  min_players: 8
  summary: SCP-5000世界をモチーフにしたサイト攻防戦。機動部隊と施設警備員が正常性、それ以外が人間性陣営として争う。
  win_condition: 正常性陣営は人間性陣営を終了させる。人間性陣営は狂気を生き延びる。
  flow:
    - SCPがSculptureへ変換される。
    - Alpha-0やUNGOCを含む独自スポーンコンテキストへ切り替わる。
    - 約22分後、施設終了プロセスが始まり、下層から順にロックダウンと除染が進む。
    - 最終的にDELTA PROTOCOL WARHEADが爆発する。
  tags: [scp5000, termination, warhead]

